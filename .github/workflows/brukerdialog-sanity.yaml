name: brukerdialog-sanity

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - apps/brukerdialog-sanity/**
      - .github/workflows/brukerdialog-sanity.yaml

jobs:
  deploy_sanity_studio:
    runs-on: ubuntu-latest
    env:
      SANITY_AUTH_TOKEN: ${{ secrets.SANITY_DEPLOY_TOKEN }}
    name: Deploy sanity studio
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # ratchet:actions/setup-node@v6
        with:
          node-version: '24.x'
      - name: Cache node modules
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # ratchet:actions/cache@v5
        id: yarn-cache-webapp
        with:
          path: apps/${{ github.workflow }}/node_modules
          key: ${{ hashFiles(format('apps/{0}/yarn.lock',github.workflow)) }}
      - name: Install
        if: steps.yarn-cache.outputs.cache-hit != 'true'
        working-directory: apps/${{ github.workflow }}
        run: yarn install --frozen-lockfile
      - name: Deploy sanity studio
        working-directory: apps/${{ github.workflow }}
        run: yarn deploy

