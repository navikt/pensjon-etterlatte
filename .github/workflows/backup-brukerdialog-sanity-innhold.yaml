name: Backup brukerdialog sanity innhold til GCP bucket
on:
  workflow_dispatch:
  schedule:
    # Kjøres kl. 14:00 hver dag
    - cron: "0 14 * * *"
jobs:
  execute:
    runs-on: ubuntu-latest
    env:
      SANITY_AUTH_TOKEN: ${{ secrets.SANITY_READ_TOKEN }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # ratchet:actions/setup-node@v6
        with:
          node-version: lts/*
          cache: yarn
          cache-dependency-path: "apps/brukerdialog-sanity/yarn.lock"
      - name: Installer pakker
        working-directory: apps/brukerdialog-sanity
        run: yarn
      - name: Export sanity dataset
        working-directory: apps/brukerdialog-sanity
        run: yarn export-sanity-innhold
      - name: Login to GCP bucket
        uses: "google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093" # ratchet:google-github-actions/auth@v3
        with:
          credentials_json: "${{ secrets.GCP_SANITY_BACKUP_SERVICE_ACCOUNT_KEY }}"
      - uses: "google-github-actions/upload-cloud-storage@6397bd7208e18d13ba2619ee21b9873edc94427a" # ratchet:google-github-actions/upload-cloud-storage@v3
        with:
          path: ./apps/brukerdialog-sanity
          destination: "brukerdialog-sanity-dataset-backup"
          glob: "backup-*.tar.gz"
